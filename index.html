<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tounsi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Écran d'accueil -->
    <section id="screen-home" class="screen">
      <div class="home-header">
        <h1 class="app-title">تونسي</h1>
        <p class="app-subtitle">Apprends le Tunisien</p>
      </div>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <!-- Écran des cartes -->
    <section id="screen-cards" class="screen off-right">
      <header class="cards-header">
        <button id="back-btn" class="back-btn" aria-label="Retour">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
          </svg>
        </button>
        <span id="cards-title" class="cards-title"></span>
        <span id="cards-counter" class="cards-counter"></span>
      </header>

      <div id="cards-viewport" class="cards-viewport">
        <div id="cards-track" class="cards-track"></div>
      </div>

      <div class="progress-bar-wrap">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
